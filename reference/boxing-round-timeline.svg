<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="960" height="300" fill="#1f2028" rx="8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0e0" letter-spacing="1">Boxing Round Timeline</text>

  <!-- ─── Layout constants ───
       Timeline: x=160 to x=920  (760px wide = 180s)
       1s = 760/180 px
       30s = 126.67px
  -->

  <!-- Section backgrounds -->
  <rect x="0"   y="48"  width="960" height="90"  fill="#2a2c36" rx="4"/>
  <rect x="0"   y="150" width="960" height="90"  fill="#222430" rx="4"/>

  <!-- Section labels -->
  <text x="12" y="100" font-size="13" fill="#aaa" font-weight="bold">3-min</text>
  <text x="12" y="115" font-size="13" fill="#aaa" font-weight="bold">Round</text>
  <text x="12" y="200" font-size="13" fill="#aaa" font-weight="bold">2-min</text>
  <text x="12" y="215" font-size="13" fill="#aaa" font-weight="bold">Round</text>

  <!-- ─── 3-MIN ROUND ─── -->
  <!-- Active Boxing bar: 0:00 → 2:30 (0 → 150s) = 0 → 633.3px -->
  <rect x="160" y="80" width="633" height="28" fill="#3a4a6b" rx="3"/>
  <text x="540" y="99" text-anchor="middle" font-size="12" fill="#a0b4d0">Active Boxing</text>

  <!-- Warning Bell bar: 2:30 → 3:00 (150 → 180s) = 633 → 760px -->
  <rect x="793" y="80" width="127" height="28" fill="#3a4a6b" rx="3"/>

  <!-- ─── 2-MIN ROUND ─── -->
  <!-- Active Boxing bar: 0:00 → 1:30 (0 → 90s) = 0 → 380px -->
  <rect x="160" y="180" width="380" height="28" fill="#3a4a6b" rx="3"/>
  <text x="413" y="199" text-anchor="middle" font-size="12" fill="#a0b4d0">Active Boxing</text>

  <!-- Warning Bell bar: 1:30 → 2:00 (90 → 120s) = 380 → 507px -->
  <rect x="540" y="180" width="127" height="28" fill="#3a4a6b" rx="3"/>

  <!-- ─── AXIS LINES & LABELS (every 30s) ─── -->
  <!-- x positions: 0s=160, 30s=287, 60s=413, 90s=540, 120s=667, 150s=793, 180s=920 -->

  <g stroke="#555" stroke-width="1" stroke-dasharray="4,3">
    <line x1="287" y1="48"  x2="287" y2="248"/>
    <line x1="413" y1="48"  x2="413" y2="248"/>
    <line x1="540" y1="48"  x2="540" y2="248"/>
    <line x1="667" y1="48"  x2="667" y2="248"/>
    <line x1="793" y1="48"  x2="793" y2="248"/>
  </g>

  <!-- Solid axis boundary lines -->
  <line x1="160" y1="48" x2="160" y2="248" stroke="#666" stroke-width="1"/>
  <line x1="920" y1="48" x2="920" y2="248" stroke="#666" stroke-width="1"/>

  <!-- Axis labels -->
  <g font-size="11" fill="#888" text-anchor="middle">
    <text x="160" y="266">0:00</text>
    <text x="287" y="266">0:30</text>
    <text x="413" y="266">1:00</text>
    <text x="540" y="266">1:30</text>
    <text x="667" y="266">2:00</text>
    <text x="793" y="266">2:30</text>
    <text x="920" y="266">3:00</text>
  </g>

  <!-- ─── MILESTONE DIAMONDS ─── -->
  <!-- Diamond macro: rotate a square 45deg around its center -->

  <!-- 3-MIN: Start Bell @ x=160 -->
  <rect x="152" y="86" width="16" height="16" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5" transform="rotate(45 160 94)"/>
  <text x="160" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#2ecc71">🔔 Start Bell</text>

  <!-- 3-MIN: Warning Bell @ x=793 -->
  <rect x="785" y="86" width="16" height="16" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1.5" transform="rotate(45 793 94)"/>
  <text x="793" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#f1c40f">⚠️ Warning Bell</text>

  <!-- 3-MIN: End Bell @ x=920 -->
  <rect x="912" y="86" width="16" height="16" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5" transform="rotate(45 920 94)"/>
  <text x="920" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">🔔 End Bell</text>

  <!-- 2-MIN: Start Bell @ x=160 -->
  <rect x="152" y="186" width="16" height="16" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5" transform="rotate(45 160 194)"/>
  <text x="160" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#2ecc71">🔔 Start Bell</text>

  <!-- 2-MIN: Warning Bell @ x=540 -->
  <rect x="532" y="186" width="16" height="16" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1.5" transform="rotate(45 540 194)"/>
  <text x="540" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#f1c40f">⚠️ Warning Bell</text>

  <!-- 2-MIN: End Bell @ x=667 -->
  <rect x="659" y="186" width="16" height="16" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5" transform="rotate(45 667 194)"/>
  <text x="667" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">🔔 End Bell</text>

</svg>
